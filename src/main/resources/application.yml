# 公共配置文件
spring:
  application:
    name: HRMS-backend
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # Jackson 日期格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # session 配置
  session:
    # 使用内存存储 session（开发环境）
    # todo 生产环境需配置 Redis 并将 store-type 改为 redis
    store-type: redis
    timeout: 2592000

  # 数据库配置（密码等敏感信息在 application-dev.yml 中，不提交到仓库）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/hrms}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  # Redis 配置
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB

cos:
  client:
    bucket: ai-code-mother-1367496754
    region: ap-guangzhou
    secretId: your-secret-id
    secretKey: your-secret-key
    host: https://ai-code-mother-1367496754.cos.ap-guangzhou.myqcloud.com

server:
  address: 0.0.0.0
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
        same-site: none
        secure: false
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.limou.hrms.controller
